services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=authdb
      - POSTGRES_USER=auth
      - POSTGRES_PASSWORD=authpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-orders:
    image: postgres:16
    container_name: postgres-orders
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=ordersdb
      - POSTGRES_USER=orders
      - POSTGRES_PASSWORD=orderspass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d ordersdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-inventory:
    image: postgres:16
    container_name: postgres-inventory
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=inventorydb
      - POSTGRES_USER=inventory
      - POSTGRES_PASSWORD=inventorypass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventorydb"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-shipping:
    image: postgres:16
    container_name: postgres-shipping
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_DB=shippingdb
      - POSTGRES_USER=shipping
      - POSTGRES_PASSWORD=shippingpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipping -d shippingdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-telemetry:
    image: postgres:16
    container_name: postgres-telemetry
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_DB=telemetrydb
      - POSTGRES_USER=telemetry
      - POSTGRES_PASSWORD=telemetrypass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetrydb"]
      interval: 5s
      timeout: 3s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: jaeger
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC (Jaeger can accept OTLP)
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  otel-collector:
    image: otel/opentelemetry-collector:0.105.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/otel-collector.yml:/etc/otelcol/config.yaml:ro
    ports:
      - "9464:9464"     # Prometheus scrape endpoint (collector metrics/export)
      - "4319:4317"     # OTLP gRPC in (we’ll point apps here)
      - "4320:4318"     # OTLP HTTP in
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
